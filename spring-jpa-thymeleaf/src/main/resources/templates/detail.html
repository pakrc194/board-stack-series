<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Detail</title>
</head>
<body>
<h2>게시글 상세</h2>
<table border="1">
    <tr>
        <th>번호</th><td th:text="${board.id}"></td>
    </tr>
    <tr>
        <th>제목</th><td th:text="${board.title}"></td>
    </tr>
    <tr>
        <th>내용</th><td th:text="${board.content}"></td>
    </tr>
    <tr>
        <th>작성일</th><td th:text="${#temporals.format(board.createdAt, 'yyyy-MM-dd')}"></td>
    </tr>
    <tr th:if="${board.fileName != null}">
        <th>첨부파일</th>
        <td>
            <a th:href="@{/board/download/{fileName}(fileName=${board.fileName})}" th:text="${board.fileName}">
            </a>
        </td>
    </tr>
</table>
<a th:href="@{/board/modify/{id}(id=${board.id})}">수정</a>
<a th:href="@{/board/delete/{id}(id=${board.id})}">삭제</a>
<a href="/board/list">목록으로</a>
</body>
</html>
