<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Modify</title>
</head>
<body>
<h2>게시글 수정</h2>
<form action="/board/modify" method="post">
    <input type="hidden" name="id" th:value="${board.id}"/>
    <table border="1">
        <tr>
            <th>제목</th>
            <td><input type="text" name="title" th:value="${board.title}"/></td>
        </tr>
        <tr>
            <th>내용</th>
            <td><textarea name="content" rows="5" cols="40" th:text="${board.content}"></textarea></td>
        </tr>
        <tr>
            <td colspan="2" align="right">
                <button type="submit">수정완료</button>
                <a th:href="@{/board/detail/{id}(id=${board.id})}">취소</a>
            </td>
        </tr>
    </table>
</form>
</body>
</html>
