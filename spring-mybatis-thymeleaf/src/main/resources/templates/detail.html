<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Detail</title>
</head>
<body>
<h2>게시글 상세</h2>
<table border="1">
    <thead>
    <tr>
        <th>제목</th><td th:text="${board.title}">제목</td>
    </tr>
    <tr>
        <th>내용</th><td th:text="${board.content}">내용</td>
    </tr>
    <tr>
        <th>작성일</th><td th:text="${board.createdAt}">작성일</td>
    </tr>
    <tr th:if="${board.fileName != null and board.fileName != ''}">
        <th>첨부파일</th>
        <td>
            <a th:href="@{/board/download/{fileName}(fileName=${board.fileName})}">
                📎 <span th:text="${board.fileName}"></span>
            </a>
        </td>
    </tr>
    <tr>
        <td colspan="2" align="right">
            <a href="/board/list">목록으로</a>
            <a th:href="@{/board/modify/{id}(id=${board.id})}">수정</a>
            <a th:href="@{/board/delete/{id}(id=${board.id})}">삭제</a>
        </td>
    </tr>
    </thead>
</table>
</body>
</html>
