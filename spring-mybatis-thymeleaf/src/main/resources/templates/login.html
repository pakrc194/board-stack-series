<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
</head>
<body>
<form action="/login" method="post">
<table border="">
    <tr>
        <th>아이디</th>
        <td>
            <input type="text" name="uid" placeholder="아이디를 입력하세요.">
        </td>
        <td rowspan="2">
            <input type="submit" value="로그인">
        </td>
    </tr>
    <tr>
        <th>비밀번호</th>
        <td>
            <input type="password" name="pw" placeholder="비밀번호를 입력하세요.">
        </td>
    </tr>
    <tr>
        <td colspan="3">
            <a href="/">홈</a>
        </td>
    </tr>
</table>
</form>
</body>
</html>
