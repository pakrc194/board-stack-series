<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>insert</title>
</head>
<body>
<h2>게시글 수정</h2>
<form action="/board/modify" method="post" enctype="multipart/form-data">
    <input type="hidden" name="id" th:value="${board.id}" readonly/>
    <table border="1">
        <thead>
        <tr>
            <th>제목</th>
            <td>
                <input type="text" name="title" th:value="${board.title}"/>
            </td>
        </tr>
        <tr>
            <th>내용</th>
            <td>
                <input type="text" name="content" th:value="${board.content}"/>
            </td>
        </tr>
        <tr>
            <th>작성일</th>
            <td th:text="${board.createdAt}">

            </td>
        </tr>
        <tr>
            <td colspan="2" align="right">
                <a th:href="@{'/board/detail/' + ${board.id}}">취소</a>
                <input type="submit" value="수정">
            </td>
        </tr>
        </thead>
    </table>
</form>
</body>
</html>
